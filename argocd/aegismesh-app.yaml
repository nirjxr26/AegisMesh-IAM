apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegismesh
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/nirjxr26/AegisMesh-IAM' # REPLACE with your repo URL
    targetRevision: aws-k3s-argocd
    path: k8s/overlays/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: aegismesh
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
