apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aegismesh

spec:
  template:
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: backend

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "1Gi"

          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000

            initialDelaySeconds: 15
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000

            initialDelaySeconds: 5
            periodSeconds: 10

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aegismesh

spec:
  template:
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: frontend

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
              ephemeral-storage: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 3000

            initialDelaySeconds: 15
            periodSeconds: 20

          readinessProbe:
            httpGet:
              path: /
              port: 3000

            initialDelaySeconds: 5
            periodSeconds: 10

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
