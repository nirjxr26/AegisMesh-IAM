    DATABASE_URL: 
    DB_NAME: 
    DB_PASSWORD: 
    DB_USER: 
    GITHUB_CALLBACK_URL: 
    GITHUB_CLIENT_ID: 
    GITHUB_CLIENT_SECRET: 
    GOOGLE_CALLBACK_URL: 
    GOOGLE_CLIENT_ID: 
    GOOGLE_CLIENT_SECRET: 
    JWT_ACCESS_SECRET: 
    JWT_REAUTH_SECRET: 
    JWT_REFRESH_SECRET: 
    JWT_SECRET: 
    REFRESH_TOKEN_SECRET: 
    SMTP_FROM: 
    SMTP_HOST: 
    SMTP_PASS: 
    SMTP_PORT: 
    SMTP_USER: 
  template:
    metadata:
      name: aegismesh-secrets
      namespace: aegismesh
    type: Opaque
