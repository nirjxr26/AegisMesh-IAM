apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aegismesh
spec:
  template:
    spec:
      containers:
        - name: frontend
          image: 654654364687.dkr.ecr.us-east-1.amazonaws.com/aegismesh-frontend:660f1cfe95cdf7b460e6c45e5e6e8edb63e77d0f
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
