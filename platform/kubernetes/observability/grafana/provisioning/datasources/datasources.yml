apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: AegisMesh PostgreSQL
    uid: aegismesh-postgres
    type: postgres
    access: proxy
    url: db:5432
    user: ${DB_USER}
    database: ${DB_NAME}
    secureJsonData:
      password: ${DB_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1700
      timescaledb: false
    editable: true
