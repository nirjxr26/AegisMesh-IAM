global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: aegismesh-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:5000

  - job_name: aegismesh-security-engine
    metrics_path: /metrics
    static_configs:
      - targets:
          - security-engine:8000

