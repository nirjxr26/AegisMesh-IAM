apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aegismesh
spec:
  template:
    spec:
      containers:
        - name: frontend
          image: 654654364687.dkr.ecr.us-east-1.amazonaws.com/aegismesh-frontend:1ea9d84feec543198177a1063d0b5b5d0b0d615f
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
