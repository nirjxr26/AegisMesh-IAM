apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aegismesh
spec:
  template:
    spec:
      containers:
        - name: frontend
          image: 654654364687.dkr.ecr.us-east-1.amazonaws.com/aegismesh-frontend:394f557c8bb6b42cffc58aed09336943ec2b9bef
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
