apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aegismesh
spec:
  template:
    spec:
      containers:
        - name: frontend
          image: 654654364687.dkr.ecr.us-east-1.amazonaws.com/aegismesh-frontend:ceb3305ba9fca3873a3ec60df9cda6579c427e2c
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
