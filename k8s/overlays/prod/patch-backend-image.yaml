apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: aegismesh

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      automountServiceAccountToken: false

      imagePullSecrets:
        - name: ecr-regcred

      initContainers:
        - name: wait-for-db
          image: postgres:17-alpine
          imagePullPolicy: Always

          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres.aegismesh.svc.cluster.local -p 5432 -U "$DB_USER" -d "$DB_NAME"; do
                echo "waiting for postgres";
                sleep 2;
              done

          envFrom:
            - configMapRef:
                name: aegismesh-config
            - secretRef:
                name: aegismesh-secrets

        - name: prisma-migrate
          image: 654654364687.dkr.ecr.us-east-1.amazonaws.com/aegismesh-backend:7d6fd99c484e7e5e9b78785c7b96111e5c90fc10
          imagePullPolicy: Always

          command:
            - sh
            - -c
            - |
              # TEMPORARY: migrations applied manually. No-op to avoid repeated failures.
              exit 0

          envFrom:
            - configMapRef:
                name: aegismesh-config
            - secretRef:
                name: aegismesh-secrets

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"

      containers:
        - name: backend
          image: 654654364687.dkr.ecr.us-east-1.amazonaws.com/aegismesh-backend:7d6fd99c484e7e5e9b78785c7b96111e5c90fc10
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: aegismesh-config
            - secretRef:
                name: aegismesh-secrets

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"

          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000

            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000

            initialDelaySeconds: 20
            periodSeconds: 10
