apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: aegismesh

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      automountServiceAccountToken: false

      initContainers:
        - name: wait-for-db
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent

          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres.aegismesh.svc.cluster.local -p 5432 -U "$DB_USER" -d "$DB_NAME"; do
                echo "waiting for postgres";
                sleep 2;
              done

          envFrom:
            - configMapRef:
                name: aegismesh-config
            - secretRef:
                name: aegismesh-secrets

        - name: prisma-migrate
          image: 654654364687.dkr.ecr.us-east-1.amazonaws.com/aegismesh-backend:b11f3991228702265ef848d95b626b06444d4a64
          imagePullPolicy: IfNotPresent

          command:
            - sh
            - -c
            - |
              # Retry migrations to tolerate transient DNS/database startup races.
              attempts=0
              until npx prisma migrate deploy; do
                attempts=$((attempts+1))
                if [ "$attempts" -ge 12 ]; then
                  echo "prisma migrate deploy failed after ${attempts} attempts"
                  exit 1
                fi
                echo "prisma migrate deploy failed (attempt ${attempts}), retrying in 5s..."
                sleep 5
              done

          envFrom:
            - configMapRef:
                name: aegismesh-config
            - secretRef:
                name: aegismesh-secrets

          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: postgresql://$(DB_USER):$(DB_PASSWORD)@postgres.aegismesh.svc.cluster.local:5432/$(DB_NAME)

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"

      containers:
        - name: backend
          image: 654654364687.dkr.ecr.us-east-1.amazonaws.com/aegismesh-backend:b11f3991228702265ef848d95b626b06444d4a64
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: aegismesh-config
            - secretRef:
                name: aegismesh-secrets

          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: postgresql://$(DB_USER):$(DB_PASSWORD)@postgres.aegismesh.svc.cluster.local:5432/$(DB_NAME)

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"

          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000

            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000

            initialDelaySeconds: 20
            periodSeconds: 10
