apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aegismesh
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ecr-regcred
      initContainers:
        - name: wait-for-db
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
        - name: prisma-migrate
          image: REPLACE_BACKEND_IMAGE
          imagePullPolicy: IfNotPresent
      containers:
        - name: backend
          image: REPLACE_BACKEND_IMAGE
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
