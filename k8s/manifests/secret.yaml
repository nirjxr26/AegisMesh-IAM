apiVersion: v1
kind: Secret
metadata:
  name: aegismesh-secrets
  namespace: aegismesh
type: Opaque
stringData:
  DB_NAME: "aegismesh"
  DB_USER: "iam_user"
  # Set DB_PASSWORD at apply time, for example:
  #   export DB_PASSWORD='your-real-db-password'
  #   envsubst < k8s/manifests/secret.yaml | kubectl apply -f -
  DB_PASSWORD: "${DB_PASSWORD}"
  DATABASE_URL: "postgresql://iam_user:${DB_PASSWORD}@postgres:5432/aegismesh"
  JWT_SECRET: "change-me-jwt-secret"
  JWT_ACCESS_SECRET: "change-me-access-secret"
  JWT_REFRESH_SECRET: "change-me-refresh-secret"
  JWT_REAUTH_SECRET: "change-me-reauth-secret"
  REFRESH_TOKEN_SECRET: "change-me-refresh-token-secret"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: "noreply@aegismesh.com"
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GOOGLE_CALLBACK_URL: "${GOOGLE_CALLBACK_URL}"
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  GITHUB_CALLBACK_URL: "${GITHUB_CALLBACK_URL}"
