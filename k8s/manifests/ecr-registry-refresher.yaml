apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-refresher
  namespace: aegismesh
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-refresher-role
  namespace: aegismesh
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-refresher-rolebinding
  namespace: aegismesh
subjects:
  - kind: ServiceAccount
    name: ecr-refresher
    namespace: aegismesh
roleRef:
  kind: Role
  name: ecr-refresher-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-registry-refresher
  namespace: aegismesh
spec:
  schedule: "0 */8 * * *" # Runs every 8 hours
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-refresher
          restartPolicy: OnFailure
          containers:
            - name: refresher
              image: alpine:3.19
              command:
                - sh
                - -c
                - |
                  set -euo pipefail
                  echo "Installing aws-cli and kubectl..."
                  apk add --no-cache aws-cli kubectl

                  echo "Fetching ECR token..."
                  TOKEN=$(aws ecr get-login-password --region us-east-1)

                  echo "Updating ecr-key secret in aegismesh namespace..."
                  kubectl create secret docker-registry ecr-key \
                    --docker-server=654654364687.dkr.ecr.us-east-1.amazonaws.com \
                    --docker-username=AWS \
                    --docker-password="$TOKEN" \
                    --dry-run=client -o yaml | kubectl apply -f -

                  echo "ECR credentials successfully refreshed."
              volumeMounts:
                - name: aws-creds
                  mountPath: /root/.aws
                  readOnly: true
          volumes:
            - name: aws-creds
              secret:
                secretName: aws-credentials
