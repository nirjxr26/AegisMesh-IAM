apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aegismesh
spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001

      initContainers:
        - name: wait-for-db
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false

          command:
            - sh
            - -c
            - |
              until pg_isready \
                -h postgres.aegismesh.svc.cluster.local \
                -p 5432 \
                -U "$DB_USER" \
                -d "$DB_NAME"; do
                echo "waiting for postgres";
                sleep 2;
              done

          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_USER

            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_PASSWORD

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
              ephemeral-storage: "128Mi"

            limits:
              cpu: "200m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"

        - name: prisma-migrate
          image: 654654364687.dkr.ecr.us-east-1.amazonaws.com/aegismesh-backend:b11f3991228702265ef848d95b626b06444d4a64
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false

          command:
            - sh
            - -c
            - |
              # Retry migrations to tolerate transient DNS/database startup races.
              attempts=0
              until npx prisma migrate deploy; do
                attempts=$((attempts+1))
                if [ "$attempts" -ge 12 ]; then
                  echo "prisma migrate deploy failed after ${attempts} attempts"
                  exit 1
                fi
                echo "prisma migrate deploy failed (attempt ${attempts}), retrying in 5s..."
                sleep 5
              done

          envFrom:
            - configMapRef:
                name: aegismesh-config

            - secretRef:
                name: aegismesh-secrets

          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: postgresql://$(DB_USER):$(DB_PASSWORD)@postgres.aegismesh.svc.cluster.local:5432/$(DB_NAME)

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"

            limits:
              cpu: "300m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"

      containers:
        - name: backend
          image: 654654364687.dkr.ecr.us-east-1.amazonaws.com/aegismesh-backend:b11f3991228702265ef848d95b626b06444d4a64
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false

          ports:
            - containerPort: 5000
              name: http

          envFrom:
            - configMapRef:
                name: aegismesh-config

            - secretRef:
                name: aegismesh-secrets

          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegismesh-secrets
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: postgresql://$(DB_USER):$(DB_PASSWORD)@postgres.aegismesh.svc.cluster.local:5432/$(DB_NAME)

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "1Gi"

          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000

            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000

            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5

          volumeMounts:
            - name: logs
              mountPath: /app/logs

      volumes:
        - name: logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: aegismesh

spec:
  selector:
    app: backend

  ports:
    - name: http
      port: 5000
      targetPort: 5000

  type: ClusterIP