apiVersion: v1
kind: ServiceAccount
metadata:
  name: trivy-operator
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trivy-operator
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "configmaps", "secrets", "services", "namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["cronjobs", "jobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["aquasecurity.github.io"]
  resources: ["vulnerabilityreports", "configauditreports", "exposedsecretreports", "rbacassessmentreports", "infraassessmentreports", "clustercompliancecontrolresults", "clustercompliancereports"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trivy-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trivy-operator
subjects:
- kind: ServiceAccount
  name: trivy-operator
  namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-operator
  namespace: monitoring
data:
  trivy.repositoryServer: "https://ghcr.io/aquasecurity/trivy-db"
  vulnerabilityReports.scanner: "Trivy"
  configAuditReports.scanner: "Trivy"
  scanJobTimeout: "5m"

