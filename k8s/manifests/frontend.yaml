apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: aegismesh

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      automountServiceAccountToken: false

      containers:
        - name: frontend
          image: aegismesh-frontend:local
          imagePullPolicy: IfNotPresent

          env:
            - name: BACKEND_UPSTREAM
              value: backend.aegismesh.svc.cluster.local:5000

          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
              ephemeral-storage: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 3000

            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /
              port: 3000

            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5

---
apiVersion: v1
kind: Service

metadata:
  name: frontend
  namespace: aegismesh

spec:
  selector:
    app: frontend

  ports:
    - name: http
      port: 3000
      targetPort: 3000