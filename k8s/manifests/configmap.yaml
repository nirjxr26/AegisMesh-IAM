apiVersion: v1
kind: ConfigMap
metadata:
  name: aegismesh-config
  namespace: aegismesh
data:
  NODE_ENV: production
  PORT: "5000"
  DB_PORT: "5432"
  LOG_LEVEL: info
  # Use HTTPS by default. Ensure TLS termination is provided by your ingress
  # / reverse proxy (recommended). For local development you can override
  # these values to use http, but do so intentionally.
  FRONTEND_URL: https://aegismesh.localhost:3000
