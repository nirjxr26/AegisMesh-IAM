apiVersion: v1
kind: ConfigMap
metadata:
  name: aegismesh-config
  namespace: aegismesh
data:
  NODE_ENV: production
  PORT: "5000"
  BACKEND_PORT: "5000"
  FRONTEND_PORT: "3000"
  DB_PORT: "5432"
  LOG_LEVEL: info
  FRONTEND_URL: http://aegismesh.localhost:3000
  BACKEND_PUBLIC_URL: http://aegismesh.localhost:5000
  FRONTEND_PUBLIC_URL: http://aegismesh.localhost:3000
