apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: security-engine-policies
  namespace: aegismesh
spec:
  podSelector:
    matchLabels:
      app: security-engine
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    - podSelector:
        matchLabels:
          app: falcosidekick
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-security-engine
  namespace: aegismesh
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: security-engine
    ports:
    - protocol: TCP
      port: 5432
