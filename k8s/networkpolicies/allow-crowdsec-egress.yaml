apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-crowdsec-egress
  namespace: aegismesh
spec:
  podSelector:
    matchLabels:
      app: crowdsec
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  - ports:
    - port: 443
      protocol: TCP
    to:
    - ipBlock:
        cidr: 0.0.0.0/0
