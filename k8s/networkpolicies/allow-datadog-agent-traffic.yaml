apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-datadog-agent-traffic
  namespace: aegismesh
spec:
  podSelector:
    matchLabels:
      app: datadog-agent
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    - podSelector:
        matchLabels:
          app: security-engine
    ports:
    - protocol: TCP
      port: 8126
    - protocol: TCP
      port: 8125
    - protocol: UDP
      port: 8125
  egress:
  # Allow egress to internet (Datadog API servers)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443
  # Allow DNS resolution
  - to:
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-datadog-agent
  namespace: aegismesh
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: datadog-agent
    ports:
    - protocol: TCP
      port: 8126
    - protocol: TCP
      port: 8125
    - protocol: UDP
      port: 8125
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-datadog-agent-se
  namespace: aegismesh
spec:
  podSelector:
    matchLabels:
      app: security-engine
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: datadog-agent
    ports:
    - protocol: TCP
      port: 8126
    - protocol: TCP
      port: 8125
    - protocol: UDP
      port: 8125
