services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: aegismesh-db
    environment:
      POSTGRES_DB: ${DB_NAME:-aegismesh}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/db/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-aegismesh}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aegismesh-network
    restart: unless-stopped

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegismesh-backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      datadog-agent:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 5000
      BACKEND_PORT: ${BACKEND_PORT:-5000}
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      DB_PORT: ${DB_PORT:-5432}
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/${DB_NAME:-aegismesh}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET must be set}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      JWT_REAUTH_SECRET: ${JWT_REAUTH_SECRET:?JWT_REAUTH_SECRET must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET must be set}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-30d}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@aegismesh.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:${BACKEND_PORT:-5000}/api/auth/oauth/google/callback}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:${BACKEND_PORT:-5000}/api/auth/oauth/github/callback}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Datadog
      DD_AGENT_HOST: datadog-agent
      DD_ENV: ${DD_ENV:-development}
      DD_SERVICE: aegismesh-backend
      DD_VERSION: ${DD_VERSION:-1.0.0}
      DD_LOGS_INJECTION: "true"
      DD_TRACE_ENABLED: "true"
      DD_PROFILING_ENABLED: "true"
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - aegismesh-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aegismesh-frontend
    depends_on:
      - backend
    environment:
      BACKEND_UPSTREAM: backend:5000
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - aegismesh-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || curl -f http://localhost:5173/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  # Prometheus Metrics Store
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: aegismesh-prometheus
    depends_on:
      - backend
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aegismesh-network
    restart: unless-stopped


  # Security Engine (ML-powered Threat Detection)
  security-engine:
    build:
      context: ./security-engine
      dockerfile: Dockerfile
    container_name: aegismesh-security-engine
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      datadog-agent:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/${DB_NAME:-aegismesh}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # Datadog
      DD_AGENT_HOST: datadog-agent
      DD_ENV: ${DD_ENV:-development}
      DD_SERVICE: aegismesh-security-engine
      DD_VERSION: ${DD_VERSION:-1.0.0}
      DD_LOGS_INJECTION: "true"
      DD_TRACE_ENABLED: "true"
      DD_PROFILING_ENABLED: "true"
    ports:
      - "8000:8000"
    networks:
      - aegismesh-network
    restart: unless-stopped

  # MLflow Tracking Server (Persistent Metadata in Postgres)
  mlflow:
    build:
      context: ./monitoring/mlflow
    container_name: aegismesh-mlflow
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://${DB_USER:-admin}:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/mlflow_db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow-artifacts
    ports:
      - "5005:5000"
    volumes:
      - mlflow_data:/mlflow-artifacts
    networks:
      - aegismesh-network
    restart: unless-stopped

  # Datadog Agent
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    container_name: aegismesh-datadog-agent
    environment:
      - DD_API_KEY=${DD_API_KEY:?DD_API_KEY must be set}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_ENV=${DD_ENV:-development}
      - DD_HOSTNAME=aegismesh-local
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_PROCESS_AGENT_ENABLED=true
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_EC2_USE_IMDSV2=false
      - DD_CLOUD_PROVIDER_METADATA=[]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    networks:
      - aegismesh-network
    restart: unless-stopped

  # Redis Cache Server
  redis:
    image: redis:7-alpine
    container_name: aegismesh-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - aegismesh-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  aegismesh-network:
    driver: bridge

volumes:
  db_data:
    driver: local
  prometheus_data:
    driver: local
  mlflow_data:
    driver: local
  redis_data:
    driver: local
