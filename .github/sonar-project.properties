sonar.projectKey=aegismesh-iam
sonar.projectName=AegisMesh IAM
sonar.sources=apps/api/src,apps/dashboard/src,packages/shared/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/tests/**,**/*.test.*,**/*.spec.*,**/__pycache__/**,**/.git/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true

# Bypass high-noise duplication (small files with unavoidable CSS string repetition)
sonar.cpd.exclusions=\
  apps/dashboard/src/pages/users/detail/*.jsx,\
  apps/dashboard/src/pages/dashboard/sections/*.jsx,\
  apps/dashboard/src/pages/settings/tabs/OrganizationTab.jsx,\
  apps/dashboard/src/pages/settings/tabs/SecurityTab.jsx,\
  apps/dashboard/src/pages/settings/tabs/ProfileTab.jsx,\
  apps/dashboard/src/pages/settings/tabs/SessionsTab.jsx,\
  apps/dashboard/src/pages/settings/tabs/shared.jsx,\
  apps/dashboard/src/components/audit/auditHelpers.js,\
  apps/api/src/middleware/rateLimiter.js,\
  apps/api/src/controllers/settings/mfaController.js,\
  apps/api/prisma/seed/index.js,\
  apps/api/src/controllers/users/bulkController.js,\
  apps/dashboard/src/utils/formatters.js,\
  packages/shared/src/formatters.ts
