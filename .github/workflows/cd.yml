name: CD

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'k8s/**'
      - 'argocd/**'
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  update-overlays:
    name: Update k8s overlays with latest ECR images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@5fd3084fc36e372ff1fff382a39b10d03659f355
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Resolve latest image tags from ECR
        id: resolve-tags
        run: |
          set -eux
          BACKEND_TAG=$(aws ecr describe-images --region "$AWS_REGION" --repository-name aegismesh-backend --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' --output text || echo "latest")
          FRONTEND_TAG=$(aws ecr describe-images --region "$AWS_REGION" --repository-name aegismesh-frontend --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' --output text || echo "latest")
          echo "backend=$BACKEND_TAG" >> $GITHUB_OUTPUT
          echo "frontend=$FRONTEND_TAG" >> $GITHUB_OUTPUT

      - name: Update k8s/overlays/prod image patches
        run: |
          set -eux
          BE_TAG=${{ steps.resolve-tags.outputs.backend }}
          FE_TAG=${{ steps.resolve-tags.outputs.frontend }}
          REG=${ECR_REGISTRY}
          bash .github/scripts/update-k8s-images.sh "${REG}/aegismesh-backend:${BE_TAG}" "${REG}/aegismesh-frontend:${FE_TAG}"

      - name: Commit and push overlay updates
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/patch-backend-image.yaml k8s/overlays/prod/patch-frontend-image.yaml || true
          if ! git diff --cached --quiet; then
            git commit -m "ci: update prod overlay images to ${GITHUB_SHA:0:7} [skip ci]" || true
            git push origin HEAD:main
          else
            echo "No image changes detected"
          fi

      - name: "Note: ArgoCD will detect overlay changes"
        run: echo "Overlay updates pushed to branch main - ArgoCD will sync automatically if configured."

  # NOTE: Removed `argocd-sync` job to enforce GitOps: CI will only update overlays and NOT apply manifests directly.

  smoke-test:
    name: Run smoke tests and rollback on failure (only if KUBECONFIG present)
    runs-on: ubuntu-latest
    needs: [update-overlays]
    if: ${{ github.event_name == 'workflow_run' || github.ref == 'refs/heads/main' }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify KUBECONFIG
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_CONTENT" ]; then
            echo "KUBECONFIG secret is not set, skipping smoke tests"
            exit 78
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@901a10e89ea615cf61f57ac05cecdf23e7de06d8

      - name: Write kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          printf '%s\n' "$KUBECONFIG_CONTENT" > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          kubectl version --client

      - name: Run smoke tests
        id: smoke
        run: |
          set -eux
          chmod +x scripts/ci/smoke-test.sh
          ./scripts/ci/smoke-test.sh

      - name: Rollback overlay commit on failure
        if: failure()
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git revert --no-edit HEAD || true
          git push origin main
