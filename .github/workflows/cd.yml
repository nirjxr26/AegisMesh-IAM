name: CD

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'k8s/**'
      - 'argocd/**'
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  update-overlays:
    name: Update k8s overlays with SHA-tagged ECR images
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Resolve image tag from triggering commit
        id: resolve-tags
        run: |
          set -eux
          if [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
            IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          else
            IMAGE_TAG="$GITHUB_SHA"
          fi
          echo "backend=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "frontend=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update k8s/overlays/prod image patches
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          set -eux
          BE_TAG=${{ steps.resolve-tags.outputs.backend }}
          FE_TAG=${{ steps.resolve-tags.outputs.frontend }}
          REG="$ECR_REGISTRY"
          bash .github/scripts/update-k8s-images.sh "${REG}/aegismesh-backend:${BE_TAG}" "${REG}/aegismesh-frontend:${FE_TAG}"

      - name: Commit overlay updates to a branch
        id: commit-overlays
        run: |
          set -eux
          BRANCH="bot/overlay-update-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          UNEXPECTED_FILES="$(git diff --name-only | grep -vE '^(k8s/overlays/prod/patch-backend-image.yaml|k8s/overlays/prod/patch-frontend-image.yaml)$' || true)"
          if [ -n "$UNEXPECTED_FILES" ]; then
            echo "Unexpected file changes detected in CD workspace:"
            printf '%s\n' "$UNEXPECTED_FILES"
            exit 1
          fi
          if git diff --quiet -- k8s/overlays/prod/patch-backend-image.yaml k8s/overlays/prod/patch-frontend-image.yaml; then
            echo "No image changes detected"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git checkout -b "$BRANCH"
          git add -- k8s/overlays/prod/patch-backend-image.yaml k8s/overlays/prod/patch-frontend-image.yaml
          git commit -m "ci: update prod overlay images for ${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT} [skip ci]"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request for overlay updates
        if: steps.commit-overlays.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          BRANCH="${{ steps.commit-overlays.outputs.branch }}"
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "ci: update prod overlay images for ${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" \
            --body "Automated overlay update generated by the CD workflow. This replaces the previous direct push to main so repository rules and CodeQL can gate the merge." \
          | tail -n 1)
          printf 'Created PR: %s\n' "$PR_URL"
          gh pr merge "$PR_URL" --auto --merge --delete-branch

      - name: "Note: ArgoCD will detect overlay changes"
        run: echo "Overlay updates were committed to a bot branch and opened as a pull request with auto-merge enabled for main."

  # NOTE: Removed `argocd-sync` job to enforce GitOps: CI will only update overlays and NOT apply manifests directly.

  smoke-test-local:
    name: Run smoke tests on local cluster
    runs-on: [self-hosted, local-cluster]
    needs: [update-overlays]
    if: ${{ github.event_name == 'workflow_run' || github.ref == 'refs/heads/main' }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KUBE_NAMESPACE: aegismesh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify local cluster access
        run: |
          kubectl config current-context
          kubectl cluster-info

      - name: Setup kubectl
        uses: azure/setup-kubectl@901a10e89ea615cf61f57ac05cecdf23e7de06d8

      - name: Verify target namespace exists
        run: |
          kubectl get namespace $env:KUBE_NAMESPACE

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/backend -n $env:KUBE_NAMESPACE --timeout=180s
          kubectl rollout status deployment/frontend -n $env:KUBE_NAMESPACE --timeout=180s

      - name: Run smoke tests
        id: smoke
        run: |
          bash ./scripts/ci/smoke-test.sh

