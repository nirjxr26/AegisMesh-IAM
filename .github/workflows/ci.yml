name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/api/**'
      - 'apps/dashboard/**'
      - 'apps/security-engine/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [ main ]
    paths:
      - 'apps/api/**'
      - 'apps/dashboard/**'
      - 'apps/security-engine/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  backend:
    name: "Backend: test / build"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Use Node.js 22.13.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.13.0'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      - name: Install backend deps
        working-directory: apps/api
        run: |
          npm ci --no-audit --no-fund
      - name: Lint backend
        working-directory: apps/api
        run: npm run lint
      - name: Run backend tests
        working-directory: apps/api
        run: npm test --silent
      - name: Build backend (artifact)
        working-directory: apps/api
        run: npm run build --if-present

  frontend:
    name: "Frontend: lint / build"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Use Node.js 22.13.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.13.0'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install frontend deps
        working-directory: apps/dashboard
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Lint frontend
        working-directory: apps/dashboard
        run: npm run lint -- --max-warnings=0
      - name: Build frontend
        working-directory: apps/dashboard
        run: npm run build --if-present

  docker-validate:
    name: "Docker: validate images build"
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build backend image
        run: docker build -t aegismesh-backend:ci -f apps/api/Dockerfile ./apps/api

      - name: Build frontend image
        run: docker build -t aegismesh-frontend:ci -f apps/dashboard/Dockerfile ./apps/dashboard

      - name: Build security-engine image
        run: docker build -t aegismesh-security-engine:ci -f apps/security-engine/Dockerfile ./apps/security-engine

  build-and-push:
    name: Build and push Docker images (main only)
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker-validate]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@5fd3084fc36e372ff1fff382a39b10d03659f355
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@5a88a04c91d5c6f97aae0d9be790e64d9b1d47b7

      - name: Build and push backend image
        working-directory: apps/api
        env:
          IMAGE_TAG: ${{ github.sha }}
          STABLE_TAG: v1
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
            docker build -t $ECR_REGISTRY/aegismesh-backend:$IMAGE_TAG -t $ECR_REGISTRY/aegismesh-backend:$STABLE_TAG -f Dockerfile .
            docker push $ECR_REGISTRY/aegismesh-backend:$IMAGE_TAG
            docker push $ECR_REGISTRY/aegismesh-backend:$STABLE_TAG

      - name: Build and push frontend image
        working-directory: apps/dashboard
        env:
          IMAGE_TAG: ${{ github.sha }}
          STABLE_TAG: v1
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
            docker build -t $ECR_REGISTRY/aegismesh-frontend:$IMAGE_TAG -t $ECR_REGISTRY/aegismesh-frontend:$STABLE_TAG -f Dockerfile .
            docker push $ECR_REGISTRY/aegismesh-frontend:$IMAGE_TAG
            docker push $ECR_REGISTRY/aegismesh-frontend:$STABLE_TAG

      - name: Build and push security-engine image
        working-directory: apps/security-engine
        env:
          IMAGE_TAG: ${{ github.sha }}
          STABLE_TAG: v1
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
            docker build -t $ECR_REGISTRY/aegismesh-security-engine:$IMAGE_TAG -t $ECR_REGISTRY/aegismesh-security-engine:$STABLE_TAG -f Dockerfile .
            docker push $ECR_REGISTRY/aegismesh-security-engine:$IMAGE_TAG
            docker push $ECR_REGISTRY/aegismesh-security-engine:$STABLE_TAG

